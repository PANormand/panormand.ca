<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Connexion — Pierre-Alexandre Normand</title>
  <style>
    *,*::before,*::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #f5f1e8;
      color: #1a1a1a;
      -webkit-font-smoothing: antialiased;
      padding: 24px;
    }
    a { color: inherit; text-decoration: none; }
    .card {
      width: 100%; max-width: 400px;
      padding: 52px 44px;
      background: #fffdf8;
      border: 1px solid #e4ddcc;
      border-radius: 10px;
      box-shadow: 0 24px 64px -24px rgba(50,30,10,.20);
    }
    .brand { font-family: Georgia, "Times New Roman", serif; font-size: 1.1rem; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 4px; }
    .brand .dot { color: #7a3b2e; }
    .card-sub { font-size: .75rem; letter-spacing: .24em; text-transform: uppercase; color: #918a7d; margin: 0 0 40px; }
    .divider { width: 40px; height: 2px; background: #7a3b2e; border: 0; margin: 0 0 40px; }
    label { display: block; font-size: .75rem; letter-spacing: .18em; text-transform: uppercase; color: #6b655b; margin-bottom: 8px; }
    .input-wrap { position: relative; }
    input[type="password"], input[type="text"] {
      display: block; width: 100%;
      padding: 13px 44px 13px 16px;
      background: #f5f1e8;
      border: 1px solid #e4ddcc;
      border-radius: 6px;
      font: inherit; font-size: 1rem; color: #1a1a1a;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input:focus { border-color: #7a3b2e; box-shadow: 0 0 0 3px rgba(122,59,46,.12); }
    .toggle-pwd {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: #918a7d; padding: 4px;
      transition: color .15s;
    }
    .toggle-pwd:hover { color: #1a1a1a; }
    .btn-login {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; margin-top: 18px;
      padding: 14px;
      background: #7a3b2e; color: #fff;
      border: none; border-radius: 6px;
      font: inherit; font-size: 1rem; font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .15s;
    }
    .btn-login:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); }
    .btn-login:disabled { opacity: .6; cursor: default; transform: none; }
    .error-msg {
      display: flex; align-items: center; gap: 8px;
      margin-top: 14px; padding: 11px 14px;
      background: #fdf0ee; border: 1px solid #e4b0a4;
      border-radius: 6px; font-size: .88rem; color: #7a3b2e;
    }
    .back { display: block; text-align: center; margin-top: 32px; font-size: .85rem; color: #918a7d; transition: color .15s; }
    .back:hover { color: #1a1a1a; }
    @media (max-width: 480px) { .card { padding: 36px 26px; border-radius: 0; border-left: 0; border-right: 0; } }
  </style>
</head>
<body>
  <div class="card">
    <p class="brand">Pierre-Alexandre Normand<span class="dot">.</span></p>
    <p class="card-sub">Administration du site</p>
    <hr class="divider" />

    <form id="loginForm" autocomplete="off">
      <label for="pwd">Mot de passe</label>
      <div class="input-wrap">
        <input type="password" id="pwd" autocomplete="current-password" autofocus required placeholder="••••••••" />
        <button type="button" class="toggle-pwd" id="togglePwd" aria-label="Afficher le mot de passe">
          <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>

      <button type="submit" class="btn-login" id="loginBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Se connecter
      </button>

      <div id="errMsg" class="error-msg" hidden>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Mot de passe incorrect. Veuillez réessayer.
      </div>
    </form>

    <a class="back" href="index.html">← Retour au site</a>
  </div>

  <script>
    // ── Déjà connecté ─────────────────────────────────────
    if (sessionStorage.getItem('pa-admin-auth') === '1') {
      window.location.replace('admin.html');
    }

    // ── Constantes ────────────────────────────────────────
    const HASH_KEY    = 'pa-admin-hash';   // localStorage : { hash, salt }
    const DEFAULT_PWD = 'PAN2026';         // mot de passe initial (remplacé après 1er changement)

    // ── Crypto PBKDF2 ─────────────────────────────────────
    function genSalt() {
      return [...crypto.getRandomValues(new Uint8Array(16))]
        .map(b => b.toString(16).padStart(2,'0')).join('');
    }
    async function pbkdf2Hash(password, salt) {
      const enc = new TextEncoder();
      const key = await crypto.subtle.importKey(
        'raw', enc.encode(password), 'PBKDF2', false, ['deriveBits']
      );
      const bits = await crypto.subtle.deriveBits(
        { name:'PBKDF2', salt: enc.encode(salt), iterations: 100000, hash:'SHA-256' },
        key, 256
      );
      return [...new Uint8Array(bits)].map(b => b.toString(16).padStart(2,'0')).join('');
    }

    async function verifyAndLogin(input) {
      const stored = JSON.parse(localStorage.getItem(HASH_KEY) || 'null');
      if (stored) {
        // Comparer avec le hash stocké
        const h = await pbkdf2Hash(input, stored.salt);
        return h === stored.hash;
      } else {
        // Première connexion : comparer au mot de passe par défaut
        if (input === DEFAULT_PWD) {
          // Hasher et persister immédiatement
          const salt = genSalt();
          const hash = await pbkdf2Hash(input, salt);
          localStorage.setItem(HASH_KEY, JSON.stringify({ hash, salt }));
          return true;
        }
        return false;
      }
    }

    // ── Afficher / masquer le mot de passe ────────────────
    document.getElementById('togglePwd').addEventListener('click', () => {
      const inp = document.getElementById('pwd');
      const showing = inp.type === 'text';
      inp.type = showing ? 'password' : 'text';
      document.getElementById('eyeIcon').innerHTML = showing
        ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
        : '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
    });

    // ── Soumission du formulaire ──────────────────────────
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errMsg');
      btn.disabled = true;
      btn.querySelector('svg').innerHTML = '<circle cx="12" cy="12" r="10" stroke-dasharray="32" stroke-dashoffset="32"><animate attributeName="stroke-dashoffset" dur=".8s" repeatCount="indefinite" values="32;0;32"/></circle>';
      err.hidden = true;

      try {
        const ok = await verifyAndLogin(document.getElementById('pwd').value);
        if (ok) {
          sessionStorage.setItem('pa-admin-auth', '1');
          window.location.replace('admin.html');
        } else {
          err.hidden = false;
          document.getElementById('pwd').value = '';
          document.getElementById('pwd').focus();
          btn.disabled = false;
          btn.querySelector('svg').innerHTML = '<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>';
        }
      } catch(ex) {
        console.error('Auth error:', ex);
        err.hidden = false;
        btn.disabled = false;
        btn.querySelector('svg').innerHTML = '<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>';
      }
    });
  </script>
</body>
</html>
